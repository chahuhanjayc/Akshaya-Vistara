services:
  - type: web
    name: tally-pro-web
    env: docker
    dockerContext: .
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tally-pro-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: OCR_ASYNC_ENABLED
        value: "False"

databases:
  - name: tally-pro-db
    plan: free
